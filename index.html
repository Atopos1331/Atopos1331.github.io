<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary Meta Tags -->
    <title>Eafoo's Terminal Portfolio</title>
    <meta name="title" content="Eafoo's Terminal Portfolio" />
    <meta
      name="description"
      content="Terminal-style personal website for Eafoo."
    />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="/" />
    <meta property="og:title" content="Eafoo's Terminal Portfolio" />
    <meta
      property="og:description"
      content="Terminal-style personal website for Eafoo."
    />
    <meta property="og:image" content="/favicon.ico" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="/" />
    <meta property="twitter:title" content="Eafoo's Terminal Portfolio" />
    <meta
      property="twitter:description"
      content="Terminal-style personal website for Eafoo."
    />
    <meta property="twitter:image" content="/favicon.ico" />

    <!-- Favicon -->
    <link rel="icon" href="/favicon.ico" />
    <meta name="msapplication-TileColor" content="#1d2a35" />
    <meta name="theme-color" content="#1d2a35" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500;700&display=swap"
      as="style"
      onload="this.onload=null;this.rel='stylesheet'"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
